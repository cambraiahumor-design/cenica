name: Post Instagram — 15 Mai (Lembrete -7 dias)

on:
  schedule:
    - cron: '0 13 15 5 *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install axios
        working-directory: scripts-instagram

      - name: Publicar no Instagram
        working-directory: scripts-instagram
        env:
          IG_USER_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          IG_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: node post-15mai.js
