<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar | Somos Cênica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body data-page="login" class="login-page">

  <div class="login-wrap">
    <a href="../index.html" class="nav-logo" style="font-size:1.25rem;margin-bottom:32px;display:inline-block;text-decoration:none;">Somos <span>Cênica</span></a>

    <div class="login-card">
      <h1 class="login-title">Área do Aluno</h1>
      <p class="login-sub">Entre com suas credenciais para acessar seus cursos e materiais.</p>

      <form id="form-login" novalidate>
        <div class="form-group">
          <label>E-mail</label>
          <input name="email" type="email" class="input" placeholder="seu@email.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input name="senha" type="password" class="input" placeholder="Sua senha" required autocomplete="current-password"/>
        </div>

        <div id="login-error" style="display:none;padding:12px 14px;background:rgba(196,82,42,.1);border:1px solid rgba(196,82,42,.3);border-radius:8px;color:#c4522a;font-size:.875rem;margin-bottom:16px;">
          E-mail ou senha incorretos. Tente novamente.
        </div>

        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:14px;">
          Entrar →
        </button>
      </form>

      <div style="text-align:center;margin-top:18px;">
        <a href="#" onclick="alert('Enviaremos um link de recuperação para: aluno@teste.com'); return false;" style="font-size:.875rem;color:var(--gray);text-decoration:none;border-bottom:1px solid var(--light-gray);">Esqueci minha senha</a>
      </div>

      <div style="margin-top:28px;padding:14px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:8px;text-align:center;">
        <p style="font-size:.8125rem;color:var(--gray);margin:0;">Credenciais de teste: <strong style="color:var(--black);">aluno@teste.com</strong> / <strong style="color:var(--black);">1234</strong></p>
      </div>
    </div>

    <p style="margin-top:24px;font-size:.875rem;color:var(--gray);text-align:center;">
      Ainda não é aluno? <a href="../index.html#cursos" style="color:var(--terra);text-decoration:none;font-weight:500;">Ver cursos disponíveis →</a>
    </p>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
