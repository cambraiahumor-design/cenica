<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Countdown — Manual Humano</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0F0A1A;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Fundo com gradiente */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 900px at 50% 20%, rgba(122,43,74,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 700px 700px at 80% 80%, rgba(212,134,58,0.2) 0%, transparent 65%),
      radial-gradient(ellipse 600px 600px at 10% 70%, rgba(100,40,160,0.2) 0%, transparent 65%),
      #0F0A1A;
    z-index: 0;
  }

  /* Partículas decorativas */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(212,134,58,0.4);
    animation: float linear infinite;
    z-index: 0;
  }

  @keyframes float {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-1920px) rotate(720deg); opacity: 0; }
  }

  /* Linhas decorativas */
  .line-top, .line-bottom {
    position: absolute;
    left: 80px; right: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,134,58,0.5), transparent);
    z-index: 1;
  }
  .line-top { top: 200px; }
  .line-bottom { bottom: 200px; }

  /* Conteúdo principal */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 80px;
    width: 100%;
  }

  /* Logo / marca */
  .brand {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,239,230,0.5);
    margin-bottom: 80px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .brand::before, .brand::after {
    content: '';
    width: 60px;
    height: 1px;
    background: rgba(212,134,58,0.4);
  }

  /* Tag */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 28px;
    border-radius: 99px;
    background: rgba(212,134,58,0.12);
    border: 1px solid rgba(212,134,58,0.4);
    color: #E8C86A;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  /* Título */
  .title-pre {
    font-size: 36px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,239,230,0.5);
    margin-bottom: 12px;
  }
  .title-main {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 140px;
    font-weight: 700;
    line-height: 0.95;
    color: #F5EFE6;
    margin-bottom: 0;
  }
  .title-sub {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 140px;
    font-weight: 700;
    font-style: italic;
    line-height: 0.95;
    color: #D4863A;
    margin-bottom: 60px;
  }

  /* Divisor */
  .divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #D4863A, transparent);
    margin-bottom: 60px;
    border-radius: 99px;
  }

  /* Countdown */
  .countdown-label {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #D4863A;
    margin-bottom: 32px;
  }

  .countdown {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 80px;
  }

  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(212,134,58,0.08);
    border: 1px solid rgba(212,134,58,0.3);
    border-radius: 24px;
    padding: 28px 36px;
    min-width: 170px;
    position: relative;
    overflow: hidden;
  }
  .cd-unit::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }

  .cd-num {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 96px;
    font-weight: 700;
    color: #F5EFE6;
    line-height: 1;
    transition: all 0.3s ease;
  }
  .cd-lbl {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #D4863A;
    margin-top: 8px;
  }

  .cd-sep {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 72px;
    font-weight: 700;
    color: rgba(212,134,58,0.4);
    padding-bottom: 30px;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Info do evento */
  .event-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 80px;
  }
  .event-row {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 32px;
    color: rgba(245,239,230,0.65);
  }
  .event-row strong {
    color: #F5EFE6;
    font-weight: 700;
  }
  .event-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(212,134,58,0.5);
  }

  /* CTA */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, #E8803A 0%, #D4863A 40%, #E8C86A 100%);
    color: #0F0A1A;
    padding: 28px 64px;
    border-radius: 99px;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.04em;
    box-shadow: 0 16px 60px rgba(212,134,58,0.5);
    animation: pulse-cta 2.5s ease-in-out infinite;
  }
  @keyframes pulse-cta {
    0%,100% { box-shadow: 0 16px 60px rgba(212,134,58,0.5), 0 0 0 0 rgba(212,134,58,0.3); }
    50%      { box-shadow: 0 20px 80px rgba(212,134,58,0.7), 0 0 0 16px rgba(212,134,58,0); }
  }

  .site-url {
    margin-top: 32px;
    font-size: 26px;
    color: rgba(245,239,230,0.35);
    letter-spacing: 0.06em;
  }

  /* Número que pisca ao mudar */
  .flip {
    animation: flip-in 0.3s ease;
  }
  @keyframes flip-in {
    0%   { transform: translateY(-10px); opacity: 0; }
    100% { transform: translateY(0);     opacity: 1; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- Partículas -->
<script>
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=Math.random()*8+3;
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:-20px;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*10}s;opacity:${Math.random()*0.5+0.2}`;
    document.body.appendChild(p);
  }
</script>

<div class="line-top"></div>
<div class="line-bottom"></div>

<div class="content">

  <div class="brand">Somos Cênica</div>

  <div class="tag">⭐ Palestra · Teresina</div>

  <p class="title-pre">Apresenta</p>
  <p class="title-main">Manual</p>
  <p class="title-sub">Humano</p>

  <div class="divider"></div>

  <p class="countdown-label">⏳ Faltam</p>

  <div class="countdown">
    <div class="cd-unit">
      <span class="cd-num" id="cd-d">--</span>
      <span class="cd-lbl">dias</span>
    </div>
    <span class="cd-sep">:</span>
    <div class="cd-unit">
      <span class="cd-num" id="cd-h">--</span>
      <span class="cd-lbl">horas</span>
    </div>
    <span class="cd-sep">:</span>
    <div class="cd-unit">
      <span class="cd-num" id="cd-m">--</span>
      <span class="cd-lbl">min</span>
    </div>
    <span class="cd-sep">:</span>
    <div class="cd-unit">
      <span class="cd-num" id="cd-s">--</span>
      <span class="cd-lbl">seg</span>
    </div>
  </div>

  <div class="event-info">
    <div class="event-row">
      <strong>22 de Maio de 2026</strong>
      <span class="event-dot"></span>
      <strong>20h</strong>
    </div>
    <div class="event-row">Teatro Torquato Neto · Teresina – PI</div>
  </div>

  <div class="cta">
    🎟 Garanta seu ingresso
  </div>
  <p class="site-url">somoscênica.com.br</p>

</div>

<script>
  const target = new Date('2026-05-22T23:00:00Z');
  const els = {
    d: document.getElementById('cd-d'),
    h: document.getElementById('cd-h'),
    m: document.getElementById('cd-m'),
    s: document.getElementById('cd-s')
  };
  let prev = {};

  function update(){
    const diff = target - Date.now();
    if(diff <= 0){
      Object.values(els).forEach(el => el.textContent = '00');
      return;
    }
    const vals = {
      d: Math.floor(diff/86400000),
      h: Math.floor((diff%86400000)/3600000),
      m: Math.floor((diff%3600000)/60000),
      s: Math.floor((diff%60000)/1000)
    };
    Object.entries(vals).forEach(([k,v])=>{
      const str = String(v).padStart(2,'0');
      if(str !== prev[k]){
        els[k].textContent = str;
        els[k].classList.remove('flip');
        void els[k].offsetWidth;
        els[k].classList.add('flip');
        prev[k] = str;
      }
    });
  }
  update();
  setInterval(update, 1000);
</script>
</body>
</html>
